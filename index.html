<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー収支管理</title>

<style>
body { font-family:sans-serif; padding:10px; background:#fafafa; margin:0; }
button { padding:10px; margin:5px; }
input { width:60px; text-align:center; }

.plus{color:green;font-weight:bold;}
.minus{color:red;font-weight:bold;}
.ok{color:green;}
.ng{color:red;}

#debug {
  font-size:12px;
  color:red;
  margin:10px 0;
}
</style>
</head>

<body>

<h2>ポーカー収支管理</h2>
<button onclick="addTable()">＋テーブル追加</button>
<button onclick="resetAll()">リセット</button>

<div id="debug"></div>
<div id="tables"></div>

<script>
const games = 5;

const defaultNames = ["A","B","C","D"];

function getTables(){
  return JSON.parse(localStorage.getItem("tables")) || [];
}

function saveTables(t){
  localStorage.setItem("tables", JSON.stringify(t));
}

/* ★ 初期化 */
window.addEventListener("DOMContentLoaded", () => {
  let tables = localStorage.getItem("tables");

  if (tables) {
    tables = JSON.parse(tables);
  } else {
    tables = [{
      names:[...defaultNames],
      data:Array.from({ length: defaultNames.length }, () =>
        Array.from({ length: games }, () => "")
      )
    }];
    localStorage.setItem("tables", JSON.stringify(tables));
  }

  renderAll();
});

/* ★ デバッグ表示 */
function showDebug(){
  const data = localStorage.getItem("tables");
  document.getElementById("debug").innerHTML =
    data ? "✅ storageあり" : "❌ storageなし";
}

/* テーブル描画 */
function renderAll(){
  showDebug();

  const tables = getTables();
  const container = document.getElementById("tables");
  container.innerHTML = "";

  tables.forEach((t, idx)=>{
    container.innerHTML += `
      <div>
        <h3>テーブル ${idx+1}</h3>
        <table border="1" id="table-${idx}"></table>
        <p id="status-${idx}"></p>
      </div>
    `;
    renderTable(idx, t.names, t.data);
  });
}

function renderTable(idx, names, data){
  const table = document.getElementById(`table-${idx}`);

  let html = "<tr><th>名前</th>";
  for(let i=0;i<games;i++) html+="<th>"+(i+1)+"</th>";
  html+="<th>合計</th></tr>";

  names.forEach((n,r)=>{
    html+="<tr><td>"+n+"</td>";
    for(let c=0;c<games;c++){
      html+=`<td><input value="${data[r][c]||""}" oninput="update(${idx})"></td>`;
    }
    html+=`<td>0</td></tr>`;
  });

  table.innerHTML = html;
  update(idx);
}

/* 更新 */
function update(idx){
  const tables = getTables();
  const table = document.getElementById(`table-${idx}`);
  const inputs = table.querySelectorAll("input");

  const names = tables[idx].names;
  let data = Array.from({ length: names.length }, () =>
    Array.from({ length: games }, () => "")
  );

  let i=0;
  for(let r=0;r<names.length;r++){
    for(let c=0;c<games;c++){
      data[r][c] = inputs[i].value==="" ? "" : Number(inputs[i].value);
      i++;
    }
  }

  tables[idx].data = data;
  saveTables(tables);

  let total=0;
  const rows = table.querySelectorAll("tr");

  names.forEach((_,r)=>{
    const sum = data[r].reduce((a,b)=>a+(Number(b)||0),0);
    total += sum;

    const cell = rows[r+1].children[names.length];
    cell.textContent = sum;
    cell.className = sum>=0 ? "plus" : "minus";
  });

  const status = document.getElementById(`status-${idx}`);
  status.textContent = total===0 ? "OK" : "ズレあり";
  status.className = total===0 ? "ok" : "ng";

  showDebug();
}

/* テーブル追加 */
function addTable(){
  const tables = getTables();

  tables.push({
    names:[...defaultNames],
    data:Array.from({ length: defaultNames.length }, () =>
      Array.from({ length: games }, () => "")
    )
  });

  saveTables(tables);
  renderAll();
}

/* リセット */
function resetAll(){
  localStorage.removeItem("tables");
  location.reload();
}

/* ★ タブ閉じ対策 */
window.addEventListener("beforeunload", () => {
  const tables = getTables();
  saveTables(tables);
});

/* ★ スマホ対策 */
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState==="hidden"){
    const tables = getTables();
    saveTables(tables);
  }
});
</script>

</body>
</html>
